---

- name: install pcloud pre requisites
  ansible.builtin.apt:
    name:
    - jq
    state: present

- name: Getting fileid
  ansible.builtin.shell: set -o pipefail && curl --oauth2-bearer {{pcloud.bearer}} -s -X GET "https://eapi.pcloud.com/listfolder?folderid={{ pcloud.folder.id }}" | jq -r --arg filename "{{ pcloud_restore_file_filename }}" '.metadata.contents[] | select(.name | test($filename)) | .fileid'
  register: fileid

- name: Getting path of file
  ansible.builtin.shell: set -o pipefail && curl --oauth2-bearer {{pcloud.bearer}} -X GET "https://eapi.pcloud.com/getfilelink?fileid={{ fileid.stdout }}" | jq -r '.path'
  register: path

- name: Getting host hosting the file
  ansible.builtin.shell: set -o pipefail && curl --oauth2-bearer {{pcloud.bearer}} -X GET "https://eapi.pcloud.com/getfilelink?fileid={{ fileid.stdout }}" | jq -r '.hosts[0]'
  register: host

- name: Declaring UrlToDownload
  ansible.builtin.set_fact:
    urltodownload: "https://{{ host.stdout }}{{ path.stdout }}"

- name: Download the file
  ansible.builtin.get_url:
    url: '{{ urltodownload }}'
    dest: '{{ pcloud_restore_file_foldername }}/{{ pcloud_restore_file_filename }}.gz'

- name: Extract files
  ansible.builtin.command: 'gunzip -f {{ pcloud_restore_file_foldername }}/{{ pcloud_restore_file_filename }}.gz'